<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake Basic</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="snake.js"></script>
  </head>
  <body>
    <main class="game-shell">
      <header class="game-header">
        <div>
          <p class="eyebrow">Browser Snake</p>
          <h1>Snake</h1>
        </div>
        <section class="score-panel" aria-label="Score board">
          <p>Score: <strong data-score>0</strong></p>
          <p>Highscore: <strong data-highscore>0</strong></p>
        </section>
      </header>

      <canvas data-board aria-label="Snake game board" width="480" height="480"></canvas>

      <p class="status" data-status>Press Start or Enter to begin. Use Arrow keys or WASD to steer.</p>

      <button type="button" data-start-button>Start Game</button>

      <section class="controls-help" aria-label="Controls">
        <h2>Controls</h2>
        <ul>
          <li>Start button or Enter starts the game.</li>
          <li>Arrow Keys or WASD change direction.</li>
          <li>Immediate 180-degree reversals are blocked.</li>
          <li>Space pauses or resumes movement.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
