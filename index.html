<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <div class="header">
        <div>
          <p class="eyebrow">Retro Canvas</p>
          <h1 id="game-title">Snake</h1>
        </div>
        <p class="score">Score <span data-score>0</span></p>
      </div>

      <canvas data-game-canvas aria-label="20 by 20 Snake game board"></canvas>

      <div class="controls">
        <button class="game-action" type="button" data-game-action>Start Game</button>
      </div>
      <p class="status" data-status>Press Start or Space to play. Use Arrow Keys or WASD to steer.</p>
      <p class="help">Eat red food, grow longer, wrap around edges, avoid your own tail, and press Space to start or restart.</p>
    </main>
  </body>
</html>
